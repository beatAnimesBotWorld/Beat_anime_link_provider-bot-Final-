services:
  - type: web
    name: anime-links-bot
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        value: '829342319'
      - key: PORT
        value: '8080'
      - key: PYTHON_VERSION
        value: '3.11'
      - key: DATABASE_URL
        fromDatabase:
          name: bot-database
          property: connectionString
